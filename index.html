<!DOCTYPE html>
<html>
<head>
    <title>My Phone Info</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #0f172a;
            color: white;
            text-align: center;
            padding: 20px;
        }

        .box {
            background: #1e293b;
            padding: 15px;
            margin: 10px auto;
            border-radius: 10px;
            max-width: 400px;
        }

        button {
            padding: 10px 20px;
            background: #22c55e;
            border: none;
            border-radius: 5px;
            color: white;
            cursor: pointer;
            margin-top: 10px;
        }
    </style>
</head>

<body>

    <h1>📱 Phone Info Dashboard</h1>

    <div class="box" id="device">Loading device info...</div>
    <div class="box" id="battery">Loading battery info...</div>
    <div class="box" id="network">Loading network info...</div>
    <div class="box" id="location">Location not fetched yet</div>

    <button onclick="getLocation()">Get Location 📍</button>

    <script>
        // DEVICE INFO
        document.getElementById("device").innerHTML = `
            <h3>Device Info</h3>
            <p><b>User Agent:</b> ${navigator.userAgent}</p>
            <p><b>Platform:</b> ${navigator.platform}</p>
            <p><b>Language:</b> ${navigator.language}</p>
        `;

        // BATTERY INFO (FIXED SAFE CHECK)
        if ('getBattery' in navigator) {
            navigator.getBattery().then(function(battery) {
                document.getElementById("battery").innerHTML = `
                    <h3>Battery</h3>
                    <p>Level: ${Math.round(battery.level * 100)}%</p>
                    <p>Charging: ${battery.charging ? "Yes 🔌" : "No"}</p>
                `;
            });
        } else {
            document.getElementById("battery").innerHTML = `
                <h3>Battery</h3>
                <p>Not supported on this device</p>
            `;
        }

        // NETWORK INFO (SAFE CHECK)
        if ('connection' in navigator) {
            document.getElementById("network").innerHTML = `
                <h3>Network</h3>
                <p>Type: ${navigator.connection.effectiveType}</p>
            `;
        } else {
            document.getElementById("network").innerHTML = `
                <h3>Network</h3>
                <p>Not supported</p>
            `;
        }

        // LOCATION (FIXED ERROR HANDLING)
        function getLocation() {
            if (navigator.geolocation) {
                navigator.geolocation.getCurrentPosition(
                    function(position) {
                        document.getElementById("location").innerHTML = `
                            <h3>Location</h3>
                            <p>Latitude: ${position.coords.latitude}</p>
                            <p>Longitude: ${position.coords.longitude}</p>
                        `;
                    },
                    function(error) {
                        document.getElementById("location").innerHTML = `
                            <h3>Location</h3>
                            <p>Permission denied or error</p>
                        `;
                    }
                );
            } else {
                document.getElementById("location").innerHTML = `
                    <h3>Location</h3>
                    <p>Geolocation not supported</p>
                `;
            }
        }
    </script>

</body>
</html>
